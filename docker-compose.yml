services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: words-learning-backend
    restart: always
    ports:
      - "8088:8088"
    environment:
      PORT: 8088
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      USE_DEEPSEEK: ${USE_DEEPSEEK:-true}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      GOOGLE_SPEECH_API_KEY: ${GOOGLE_SPEECH_API_KEY:-}
      BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY:-}
      BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY:-}
      BAIDU_SPEECH_API_KEY: ${BAIDU_SPEECH_API_KEY:-}
      BAIDU_SPEECH_SECRET_KEY: ${BAIDU_SPEECH_SECRET_KEY:-}
      USE_GOOGLE_VISION: ${USE_GOOGLE_VISION:-true}
      USE_BAIDU_SPEECH: ${USE_BAIDU_SPEECH:-false}
    networks:
      - photoshare-network

networks:
  photoshare-network:
    external: true
    name: docker_photoshare-network
