version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: words-learning-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: words-learning
    volumes:
      - mongodb_data:/data/db
    networks:
      - words-learning-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: words-learning-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/words-learning?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_this
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - words-learning-network

volumes:
  mongodb_data:

networks:
  words-learning-network:
    driver: bridge
