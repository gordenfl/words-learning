version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: words-learning-backend
    restart: always
    ports:
      - "3003:3003"
    environment:
      PORT: ${PORT:-3003}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      USE_DEEPSEEK: ${USE_DEEPSEEK:-true}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}
      BAIDU_OCR_API_KEY: ${BAIDU_OCR_API_KEY}
      BAIDU_OCR_SECRET_KEY: ${BAIDU_OCR_SECRET_KEY}
      USE_GOOGLE_VISION: ${USE_GOOGLE_VISION:-true}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - photoshare-network # 使用外部 MongoDB 所在的网络

# 使用外部已存在的网络
networks:
  photoshare-network:
    external: true
    name: docker_photoshare-network
